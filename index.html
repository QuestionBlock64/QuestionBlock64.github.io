<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        :root {
            --bg-color: #fcecf4;
            --header-pink: #ffb6c1;
            --accent-pink: #ff69b4;
            --text-dark: #4a4a4a;
            --dark-purple: #4a235a;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--dark-purple); color: var(--text-dark); height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        #gallery-menu { background-color: var(--bg-color); width: 80%; height: 80%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; position: relative; }

        .menu-header { padding: 15px 20px; font-weight: bold; color: var(--dark-purple); border-bottom: 2px solid var(--header-pink); display: flex; justify-content: space-between; }

        .grid-container { padding: 30px 30px 150px 30px; display: grid; grid-template-columns: repeat(6, 1fr); row-gap: 150px; column-gap: 35px; overflow-y: auto; flex-grow: 1; min-height: 0; align-content: start; }

        .grid-item { background-color: #e0e0e0; border-radius: 5px; cursor: pointer; aspect-ratio: 16/9; width: 100%; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; position: relative; }
        .grid-item:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4); }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

        #image-viewer { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--dark-purple); flex-direction: column; z-index: 100; }
        .main-image-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; background-color: #2a0845; padding: 20px; }
        .main-image-container img { max-width: 90%; max-height: 70vh; box-shadow: 0 0 20px rgba(0,0,0,0.8); }

        .info-bar { background-color: rgba(0, 0, 0, 0.8); color: #aaa; text-align: center; padding: 10px; font-family: monospace; font-size: 14px; }
        .carousel-container { height: 150px; background-color: var(--dark-purple); display: flex; align-items: center; justify-content: center; padding: 0 20px; position: relative; }
        .carousel-track { display: flex; gap: 15px; overflow-x: auto; max-width: 70%; padding: 10px; scrollbar-width: none; }
        .carousel-track::-webkit-scrollbar { display: none; }
        .thumb { width: 160px; height: 90px; flex-shrink: 0; background-color: #333; cursor: pointer; opacity: 0.6; transition: opacity 0.2s, transform 0.2s; border: 2px solid transparent; }
        .thumb:hover, .thumb.active { opacity: 1; }
        .thumb.active { border-color: var(--accent-pink); transform: scale(1.05); }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }

        .arrow { font-size: 40px; color: var(--accent-pink); cursor: pointer; user-select: none; padding: 0 20px; }
        .arrow:hover { color: #ff99cc; }

        .viewer-controls { position: absolute; bottom: 20px; right: 40px; display: flex; gap: 20px; color: white; font-size: 18px; }
        .btn-control { cursor: pointer; transition: color 0.2s; }
        .btn-control:hover { color: var(--header-pink); }

        @media (max-width: 1200px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 800px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div id="gallery-menu">
        <div class="menu-header">
            <span>Pictures</span>
            <span style="cursor: pointer;" onclick="closeViewer()">&times;</span>
        </div>
        <div class="grid-container" id="grid-container"></div>
    </div>

    <div id="image-viewer">
        <div class="main-image-container">
            <img id="main-display-img" src="" alt="Selected Image">
        </div>
        <div class="info-bar" id="info-bar">Loading...</div>
        <div class="carousel-container">
            <div class="arrow" onclick="changeImage(-1)">&#9664;</div>
            <div class="carousel-track" id="carousel-track"></div>
            <div class="arrow" onclick="changeImage(1)">&#9654;</div>
            <div class="viewer-controls">
                <div class="btn-control">Set Wallpaper</div>
                <div class="btn-control" onclick="closeViewer()">Back</div>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USERNAME = "QuestionBlock64";
        const REPO_NAME = "The-Bee-Folder";        
        const FOLDER_NAME = "The Bee Folder";      
        let imageFiles = [];
        let currentIndex = 0;

        const gridContainer = document.getElementById('grid-container');
        const galleryMenu = document.getElementById('gallery-menu');
        const imageViewer = document.getElementById('image-viewer');
        const mainDisplayImg = document.getElementById('main-display-img');
        const carouselTrack = document.getElementById('carousel-track');
        const infoBar = document.getElementById('info-bar');

        async function fetchImagesFromGitHub() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${encodeURIComponent(FOLDER_NAME)}`);
                const files = await response.json();
                imageFiles = files.filter(f => f.type === 'file').map(f => ({ name: f.name, url: f.download_url }));
                buildGallery();
            } catch (e) { infoBar.innerText = "Error loading images."; }
        }

        function buildGallery() {
            imageFiles.forEach((file, index) => {
                const gridItem = document.createElement('div');
                gridItem.className = 'grid-item';
                gridItem.innerHTML = `<img src="${file.url}" alt="${file.name}">`;
                gridItem.onclick = (e) => openViewer(index, e);
                gridContainer.appendChild(gridItem);

                const thumb = document.createElement('div');
                thumb.className = 'thumb';
                thumb.id = `thumb-${index}`;
                thumb.innerHTML = `<img src="${file.url}">`;
                thumb.onclick = () => setImage(index);
                carouselTrack.appendChild(thumb);
            });
        }

        function openViewer(index, event) {
            // 1. Snapshot the starting position
            const sourceRect = event.currentTarget.getBoundingClientRect();
            
            // 2. Briefly show the viewer so we can calculate the final "target" size/position
            imageViewer.style.display = 'flex';
            imageViewer.style.visibility = 'hidden'; 
            setImage(index);

            // Wait one frame to ensure layout is calculated
            requestAnimationFrame(() => {
                const targetRect = mainDisplayImg.getBoundingClientRect();
                imageViewer.style.display = 'none';
                imageViewer.style.visibility = 'visible';

                // 3. Create Clone for animation
                const clone = event.currentTarget.cloneNode(true);
                clone.style.position = 'fixed';
                clone.style.top = sourceRect.top + 'px';
                clone.style.left = sourceRect.left + 'px';
                clone.style.width = sourceRect.width + 'px';
                clone.style.height = sourceRect.height + 'px';
                clone.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                clone.style.zIndex = '1000';
                document.body.appendChild(clone);

                // 4. Animate to target
                requestAnimationFrame(() => {
                    clone.style.top = targetRect.top + 'px';
                    clone.style.left = targetRect.left + 'px';
                    clone.style.width = targetRect.width + 'px';
                    clone.style.height = targetRect.height + 'px';
                    clone.style.borderRadius = '0';
                });

                // 5. Cleanup
                setTimeout(() => {
                    galleryMenu.style.display = 'none';
                    imageViewer.style.display = 'flex';
                    clone.remove();
                }, 400);
            });
        }

        function closeViewer() {
            imageViewer.style.display = 'none';
            galleryMenu.style.display = 'flex';
        }

        function setImage(index) {
            currentIndex = index;
            mainDisplayImg.src = imageFiles[index].url;
            infoBar.innerText = `[VIEWING] ${imageFiles[index].name}`;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            const activeThumb = document.getElementById(`thumb-${index}`);
            if(activeThumb) activeThumb.classList.add('active');
        }

        function changeImage(dir) {
            let next = currentIndex + dir;
            if(next < 0) next = imageFiles.length - 1;
            if(next >= imageFiles.length) next = 0;
            setImage(next);
        }

        fetchImagesFromGitHub();
    </script>
</body>
</html>
