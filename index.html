<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        :root {
            --bg-color: #fcecf4;
            --header-pink: #ffb6c1;
            --accent-pink: #ff69b4;
            --text-dark: #4a4a4a;
            --dark-purple: #4a235a;
        }

        body { margin: 0; font-family: sans-serif; background-color: var(--dark-purple); color: var(--text-dark); height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        #gallery-menu { background-color: var(--bg-color); width: 80%; height: 80%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .menu-header { padding: 15px 20px; font-weight: bold; color: var(--dark-purple); border-bottom: 2px solid var(--header-pink); display: flex; justify-content: space-between; }
        .grid-container { padding: 30px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px; overflow-y: auto; flex-grow: 1; align-content: start; }
        .grid-item { background-color: #e0e0e0; cursor: pointer; aspect-ratio: 16/9; overflow: hidden; transition: transform 0.2s; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        
        #image-viewer { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(74, 35, 90, 0.95); flex-direction: column; z-index: 100; }
        .main-image-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .main-image-container img { max-width: 90%; max-height: 70vh; box-shadow: 0 0 20px rgba(0,0,0,0.8); }

        .carousel-container { height: 150px; background-color: #2a0845; display: flex; align-items: center; justify-content: center; padding: 0 20px; }
        .thumb { width: 160px; height: 90px; margin: 0 10px; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; border: 2px solid transparent; }
        .thumb.active { opacity: 1; border-color: var(--accent-pink); }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="gallery-menu">
        <div class="menu-header">Pictures <span style="cursor: pointer;" onclick="closeViewer()">Close</span></div>
        <div class="grid-container" id="grid-container"></div>
    </div>

    <div id="image-viewer">
        <div class="main-image-container">
            <img id="main-display-img" src="" alt="Selected">
        </div>
        <div class="carousel-container" id="carousel-track"></div>
    </div>

    <script>
        const GITHUB_USERNAME = "QuestionBlock64";
        const REPO_NAME = "The-Bee-Folder";
        const FOLDER_NAME = "The Bee Folder";
        let imageFiles = [];

        async function init() {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${encodeURIComponent(FOLDER_NAME)}`);
            imageFiles = (await res.json()).filter(f => f.type === 'file').map(f => ({ url: f.download_url }));
            
            const grid = document.getElementById('grid-container');
            imageFiles.forEach((file, i) => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerHTML = `<img src="${file.url}">`;
                item.onclick = (e) => openViewer(i, e);
                grid.appendChild(item);
            });
        }

        function openViewer(index, event) {
            const viewer = document.getElementById('image-viewer');
            const mainImg = document.getElementById('main-display-img');
            
            // 1. Snapshot start
            const sourceRect = event.currentTarget.getBoundingClientRect();
            
            // 2. Prep viewer (visibility hidden keeps it in DOM for measurement)
            viewer.style.display = 'flex';
            viewer.style.visibility = 'hidden';
            mainImg.src = imageFiles[index].url;
            
            // 3. Get target rect, then hide viewer again
            const targetRect = mainImg.getBoundingClientRect();
            viewer.style.visibility = 'visible';
            viewer.style.display = 'none';

            // 4. Animate Clone
            const clone = event.currentTarget.cloneNode(true);
            clone.style.position = 'fixed';
            clone.style.top = sourceRect.top + 'px';
            clone.style.left = sourceRect.left + 'px';
            clone.style.width = sourceRect.width + 'px';
            clone.style.height = sourceRect.height + 'px';
            clone.style.transition = 'all 0.4s ease-out';
            clone.style.zIndex = '999';
            document.body.appendChild(clone);

            setTimeout(() => {
                clone.style.top = targetRect.top + 'px';
                clone.style.left = targetRect.left + 'px';
                clone.style.width = targetRect.width + 'px';
                clone.style.height = targetRect.height + 'px';
                clone.style.borderRadius = '0';
            }, 10);

            setTimeout(() => {
                viewer.style.display = 'flex';
                clone.remove();
            }, 400);
        }

        function closeViewer() {
            document.getElementById('image-viewer').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
